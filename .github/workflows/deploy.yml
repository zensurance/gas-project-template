name: Test & Deploy to Apps Script

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write clasp credentials
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Write .clasp.json
        run: |
          echo '{
            "scriptId": "${{ secrets.SCRIPT_ID }}",
            "rootDir": "."
          }' > .clasp.json

      - name: Push to Apps Script
        run: clasp push --force

      - name: Create version and update deployment
        run: |
          VERSION=$(clasp version "CI deploy $(date +%Y-%m-%d_%H:%M)" 2>&1 | grep -oP 'Created version \K\d+')
          echo "Created version $VERSION"
          clasp deploy -V "$VERSION" -i "${{ secrets.DEPLOYMENT_ID }}" -d "CI deploy v$VERSION"
          echo "Deployment updated to version $VERSION"
